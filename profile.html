<style>
:root{
  --profile-primary:#6B8F71;
  --profile-primary-dark:#4F6F5A;
  --profile-deep:#174B33;
  --profile-green:#0F5A3D;
  --profile-gold:#B8861B;
  --profile-gold-soft:#FFF8E8;
  --profile-bg:#F6F8F7;
  --profile-card:#FFFFFF;
  --profile-border:#E3E8E5;
  --profile-text:#2F3E36;
  --profile-muted:#66756D;
  --profile-shadow:0 16px 36px rgba(47,58,54,.12);
  --profile-nav:58px;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;background:var(--profile-bg);color:var(--profile-text);font-family:"Poppins",system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;overflow-x:hidden}
button,input,textarea,select{font:inherit}button{border:none;cursor:pointer;background:transparent}
.profile-page{width:100%;max-width:520px;min-height:100vh;margin:0 auto;padding:0 14px calc(var(--profile-nav) + 10px);background:linear-gradient(180deg,#F6F8F7 0%,#FFFEFA 58%,#FFFFFF 100%)}
.profile-header{margin:0 -14px 0;padding:32px 20px 82px;position:relative;overflow:hidden;color:#fff;background:radial-gradient(circle at 8% 52%,rgba(255,255,255,.12),transparent 28%),linear-gradient(135deg,var(--profile-primary),var(--profile-primary-dark));border-radius:0 0 30px 30px;box-shadow:0 14px 30px rgba(47,58,54,.15)}
.profile-header::before{content:"";position:absolute;left:-18px;top:74px;width:100px;height:120px;opacity:.11;background:radial-gradient(ellipse at center,rgba(255,255,255,.9) 0 12%,transparent 13% 100%);transform:rotate(-28deg)}
.profile-header-row{position:relative;z-index:1;display:flex;align-items:flex-start;justify-content:space-between;gap:12px}.profile-heading h1{margin:0;font-size:36px;line-height:1;font-weight:900;letter-spacing:0;text-shadow:0 2px 10px rgba(0,0,0,.12)}.profile-heading p{margin:10px 0 0;color:rgba(255,255,255,.92);font-size:17px;line-height:1.25}
.profile-badge{min-width:142px;padding:11px 13px;border-radius:18px;border:1px solid #EAD8A6;background:linear-gradient(180deg,#FFFDF8,#FFF5DD);color:#6F4510;text-align:center;box-shadow:0 12px 24px rgba(17,24,39,.16)}.profile-badge b{display:block;font-size:16px;line-height:1.12;font-weight:900}.profile-badge small{display:block;margin-top:5px;font-size:12px;color:#7B5A25}.profile-badge.expired{cursor:pointer;box-shadow:0 12px 28px rgba(184,134,27,.22),0 0 0 3px rgba(255,248,232,.32)}.profile-badge.premium{background:linear-gradient(180deg,#EEF5F1,#FFFFFF);color:var(--profile-deep);border-color:#CFE2D5}
.profile-user-card{margin:-42px 16px 18px;position:relative;z-index:2;min-height:108px;padding:16px 20px;display:flex;align-items:center;gap:16px;background:#fff;border:1px solid var(--profile-border);border-radius:23px;box-shadow:var(--profile-shadow)}.profile-avatar{width:70px;height:70px;flex:0 0 auto;border-radius:50%;display:grid;place-items:center;background:linear-gradient(135deg,var(--profile-primary),var(--profile-primary-dark));color:#fff;font-size:38px;font-weight:800;border:4px solid #EEF5F1;box-shadow:0 12px 22px rgba(47,58,54,.17)}.profile-user-name{margin:0;color:var(--profile-deep);font-size:23px;line-height:1.08;font-weight:900}.profile-user-phone{margin:7px 0 0;display:flex;align-items:center;gap:8px;color:#3F4944;font-size:17px}.phone-mark{color:var(--profile-primary-dark);font-weight:900}
.profile-card{background:var(--profile-card);border:1px solid var(--profile-border);border-radius:22px;box-shadow:var(--profile-shadow)}.invite-card{margin:0 16px 20px;padding:16px 18px;background:linear-gradient(135deg,#FFFDF8 0%,#FFF8EA 42%,#FFFFFF 100%);border:1.5px dashed #D9A43D;box-shadow:0 12px 28px rgba(184,134,27,.10)}.invite-top{display:grid;grid-template-columns:66px 1fr;gap:10px;align-items:center;margin-bottom:12px}.invite-art{width:54px;height:54px;display:grid;place-items:center;color:var(--profile-gold)}.invite-art svg{width:54px;height:54px}.invite-title h2{margin:0;color:var(--profile-deep);font-size:22px;line-height:1.12;font-weight:900}.invite-title p{margin:5px 0 0;color:#626E68;font-size:15px}.invite-link-row{display:grid;grid-template-columns:1fr 132px;gap:8px;align-items:center;margin-bottom:12px}.invite-url{min-height:48px;display:flex;align-items:center;gap:12px;padding:12px 14px;border:1px solid #E4D4B5;border-radius:15px;background:#fff;color:#111827;font-size:15px;line-height:1.25;overflow:hidden}.invite-url span:last-child{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.link-mark{flex:0 0 auto;color:var(--profile-green);font-weight:900}.copy-btn{height:48px;border-radius:14px;background:linear-gradient(135deg,#174B33,#0F5A3D);color:#fff;border:1px solid #0E4B31;font-weight:900;font-size:15px;display:flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 10px 18px rgba(15,90,61,.20)}.copy-btn:active,.whatsapp-btn:active,.tile-btn:active{transform:scale(.985)}.whatsapp-btn{width:100%;min-height:48px;border-radius:16px;background:linear-gradient(135deg,var(--profile-primary),var(--profile-primary-dark));color:#fff;font-size:18px;font-weight:850;display:flex;align-items:center;justify-content:center;gap:12px;box-shadow:0 12px 22px rgba(79,111,90,.24)}
.profile-actions{margin:0 16px 22px;display:grid;grid-template-columns:repeat(3,1fr);gap:18px}.tile-btn{min-height:116px;border-radius:18px;background:#fff;border:1px solid var(--profile-border);box-shadow:0 12px 24px rgba(47,58,54,.09);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:var(--profile-deep);font-size:16px;font-weight:850;transition:transform .18s ease}.tile-icon{width:42px;height:42px;display:grid;place-items:center}.tile-icon svg{width:40px;height:40px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}.tile-gold{color:var(--profile-gold)}.tile-red{color:#D94135}.tile-green{color:#3F7656}.tile-btn.logout .tile-icon{color:#D94135}
.app-info-card{margin:0 16px 12px;padding:18px 22px;min-height:96px;display:flex;align-items:center;gap:18px;background:#fff;border:1px solid var(--profile-border);border-radius:22px;box-shadow:var(--profile-shadow)}.app-medal{width:72px;height:62px;display:grid;place-items:center;color:var(--profile-gold);flex:0 0 auto}.app-medal svg{width:72px;height:62px}.app-info-card h2{margin:0;color:var(--profile-deep);font-size:22px}.app-info-card p{margin:7px 0 0;color:#505A55;font-size:18px}
.home-bottom-nav{position:fixed;left:50%;bottom:0;transform:translateX(-50%);width:100%;max-width:520px;height:58px;background:#fff;border-top:1px solid var(--profile-border);box-shadow:0 -8px 24px rgba(47,58,54,.10);display:grid;grid-template-columns:repeat(4,1fr);z-index:9000;padding:4px 6px}.home-bottom-nav button{background:transparent;color:var(--profile-muted);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;border-radius:12px;font-size:11px;font-weight:700}.home-bottom-nav button span{font-size:20px;line-height:1}.home-bottom-nav button.active{background:#EEF5F0;color:var(--profile-primary-dark)}
.profile-modal{position:fixed;inset:0;z-index:10000;display:none;align-items:center;justify-content:center;padding:16px;background:rgba(23,35,31,.46)}.profile-modal.show{display:flex}.profile-modal-card{width:min(100%,452px);max-height:88vh;overflow:auto;background:#fff;border:1px solid #E3E8E5;border-radius:24px;padding:18px;box-shadow:0 24px 70px rgba(0,0,0,.24);animation:profilePop .22s ease}.profile-modal-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px}.profile-modal-head h2{margin:0;color:var(--profile-deep);font-size:23px}.profile-modal-head p{margin:5px 0 0;color:var(--profile-muted)}.profile-close{width:40px;height:40px;border-radius:14px;background:#EEF5F1;color:var(--profile-deep);font-size:25px;line-height:1}.profile-modal-text{color:#4F5A54;line-height:1.55;font-size:15px}.profile-modal-actions{display:grid;grid-template-columns:1fr;gap:10px;margin-top:16px}.profile-primary-btn,.profile-light-btn{min-height:50px;border-radius:14px;font-size:15px;font-weight:900}.profile-primary-btn{background:linear-gradient(135deg,var(--profile-green),#0E4B31);color:#fff}.profile-light-btn{background:#EEF5F1;color:var(--profile-deep);border:1px solid #DDECE1}.note-badge{display:inline-flex;padding:6px 12px;border-radius:999px;background:#FFF8E8;color:#7B5A25;font-weight:900;margin-bottom:10px}.note-box{margin:10px 0;padding:13px;border-radius:16px;background:#F8FBF8;border:1px solid #DDECE1;color:#33413A;line-height:1.55}.score-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.score-box{padding:12px;border-radius:16px;background:#F8FBF8;border:1px solid #DDECE1;text-align:center}.score-box small{display:block;color:var(--profile-muted);font-weight:800}.score-box b{display:block;margin-top:4px;color:var(--profile-deep);font-size:22px}.support-list{display:grid;gap:10px}
@keyframes profilePop{from{transform:translateY(12px);opacity:.72}to{transform:none;opacity:1}}
@media(max-width:390px){.profile-header{padding:30px 18px 78px}.profile-heading h1{font-size:32px}.profile-heading p{font-size:15px}.profile-badge{min-width:126px;padding:10px 11px}.profile-user-card{margin-left:8px;margin-right:8px;gap:14px;padding:14px 16px}.profile-avatar{width:62px;height:62px;font-size:34px}.profile-user-name{font-size:21px}.profile-user-phone{font-size:15px}.invite-card,.profile-actions,.app-info-card{margin-left:8px;margin-right:8px}.invite-top{grid-template-columns:58px 1fr}.invite-title h2{font-size:20px}.invite-link-row{grid-template-columns:1fr}.copy-btn{width:100%}.profile-actions{gap:12px}.tile-btn{min-height:100px;font-size:14px}.tile-icon svg{width:34px;height:34px}.app-info-card{padding:16px}.app-info-card h2{font-size:20px}.app-info-card p{font-size:16px}}
</style>
</head>
<body>
<main class="profile-page">
  <header class="profile-header">
    <div class="profile-header-row">
      <div class="profile-heading">
        <h1>My Profile</h1>
        <p>Your Personal Dashboard</p>
      </div>
      <button id="profileBadge" class="profile-badge" type="button" aria-label="Premium status">

  <section class="profile-user-card" aria-label="User details">

  <section class="invite-card" aria-label="Invite your friend">

      <div class="invite-art" aria-hidden="true">
        <svg viewBox="0 0 64 64"><circle cx="24" cy="22" r="10" stroke="currentColor"/><circle cx="44" cy="25" r="7" stroke="currentColor"/><path d="M8 54c2-14 11-20 22-20s20 6 22 20" stroke="currentColor"/><path d="M36 45c4-6 10-8 17-5 4 2 7 7 8 14" stroke="currentColor"/><path d="M49 7l2 6 6 2-6 2-2 6-2-6-6-2 6-2 2-6z" fill="currentColor" stroke="none"/></svg>

      <div class="invite-url"><span class="link-mark">&#128279;</span><span id="inviteLinkText">https://tinyurl.com/Tet-Success-Download</span></div>
      <button id="copyInviteBtn" class="copy-btn" type="button"><span>&#9635;</span> Copy Link</button>

  <section class="profile-actions" aria-label="Profile actions">

    <button id="smartNotesBtn" class="tile-btn" type="button"><span class="tile-icon tile-green"><svg viewBox="0 0 48 48"><path d="M16 7h18a5 5 0 0 1 5 5v29H16a7 7 0 0 1-7-7V14a7 7 0 0 1 7-7z"/><path d="M16 7v34M22 18h10M22 26h10"/></svg></span><span>Smart Notes</span></button>
    <button id="scoresBtn" class="tile-btn" type="button"><span class="tile-icon tile-green"><svg viewBox="0 0 48 48"><path d="M9 39h30M13 35V24h6v11M22 35V14h6v21M31 35V8h6v27"/></svg></span><span>Scores</span></button>
    <button id="reminderBtn" class="tile-btn" type="button"><span class="tile-icon tile-green"><svg viewBox="0 0 48 48"><path d="M17 39h14M20 40a4 4 0 0 0 8 0M12 34h24l-3-4v-9a9 9 0 0 0-18 0v9l-3 4zM24 8v4"/></svg></span><span>Reminder</span></button>
    <button id="supportBtn" class="tile-btn" type="button"><span class="tile-icon tile-green"><svg viewBox="0 0 48 48"><path d="M12 27v-5a12 12 0 0 1 24 0v5"/><path d="M12 27v7h7v-9h-5a2 2 0 0 0-2 2zM36 27v7h-7v-9h5a2 2 0 0 1 2 2z"/><path d="M31 37c-2 3-5 4-9 4"/></svg></span><span>Support</span></button>
    <button id="logoutBtn" class="tile-btn logout" type="button"><span class="tile-icon"><svg viewBox="0 0 48 48"><path d="M20 10H9v28h11"/><path d="M28 16l8 8-8 8M36 24H18"/></svg></span><span>Logout</span></button>
  </section>

  <section class="app-info-card" aria-label="App info">
    <div class="app-medal" aria-hidden="true"><svg viewBox="0 0 80 70"><path d="M19 11c-6 9-9 20-7 32M61 11c6 9 9 20 7 32M25 55c-6-2-11-6-15-11M55 55c6-2 11-6 15-11" stroke="currentColor" fill="none" stroke-width="3"/><path d="M25 18h30v28H25z" fill="#174B33"/><path d="M30 24c7 0 10 3 10 3s3-3 10-3v15c-7 0-10 3-10 3s-3-3-10-3V24z" fill="#fff"/><path d="M40 12l18 8-18 8-18-8 18-8z" fill="#174B33"/></svg></div>
    <div><h2>TET Success</h2><p>Version 1.0</p></div>

</main>

<nav class="home-bottom-nav" aria-label="Bottom navigation">

<div id="profileModal" class="profile-modal" aria-hidden="true">
  <div class="profile-modal-card">
    <div class="profile-modal-head">
      <div><h2 id="modalTitle">Title</h2><p id="modalSub"></p></div>
      <button id="modalCloseBtn" class="profile-close" type="button">&times;</button>
    </div>
    <div id="modalBody" class="profile-modal-text"></div>
  </div>
</div>

<script src="config.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="tet_app_settings.js"></script>
<script src="common.js"></script>
<script>
"use strict";
(function(){
  const INVITE_LINK = "https://tinyurl.com/Tet-Success-Download";
  const SMART_NOTE_CACHE = "tet_smart_notes_latest_v1";
  const MOCK_RESULT_KEY = "tet_daily_mock_last_result_v1";
  const $ = (id) => document.getElementById(id);

  let currentUser = null;
  let trialStatus = null;
  let appSettings = {};

  function client(){ return window.tetSupabase || window.supabase; }
  function text(value, fallback){ return String(value || fallback || ""); }
  function safe(value){ return typeof escapeHTML === "function" ? escapeHTML(value) : String(value ?? ""); }
  function isPremiumUser(){
    return trialStatus?.status === "premium" || trialStatus?.payment_verified === true || currentUser?.status === "premium";
  }
  function openModal(title, body, sub){
    $("modalTitle").textContent = title;
    $("modalSub").textContent = sub || "";
    $("modalBody").innerHTML = body;
    $("profileModal").classList.add("show");
    $("profileModal").setAttribute("aria-hidden", "false");
  }
  function closeModal(){
    $("profileModal").classList.remove("show");
    $("profileModal").setAttribute("aria-hidden", "true");
  }
  function getUserName(){ return text(currentUser?.full_name || currentUser?.name, "Student"); }
  function getUserPhone(){ return text(currentUser?.phone || currentUser?.mobile, "Phone"); }
  function getAdminPhone(){ return text(appSettings?.admin_whatsapp_number, "9836697502"); }
  function getInitial(name){ return text(name, "T").trim().charAt(0).toUpperCase() || "T"; }

  async function loadUserAndStatus(){
    currentUser = typeof getUserSession === "function" ? getUserSession() : null;
    if (!currentUser) {
      window.location.href = CONFIG.LOGIN_PAGE;
      return false;
    }

    try {
      const { data: freshUser } = await client()
        .from(CONFIG.TABLES.USERS)
        .select("*")
        .eq("id", currentUser.id)
        .maybeSingle();

      if (freshUser) {
        currentUser = freshUser;
        if (typeof saveUserSession === "function") saveUserSession(freshUser);
      }
    } catch (error) {
      console.warn("Profile user refresh skipped", error);
    }

    try {
      const { data: statusData } = await client()
        .from(CONFIG.TABLES.TRIAL_PREMIUM)
        .select("*")
        .eq("user_id", currentUser.id)
        .maybeSingle();
      trialStatus = statusData || null;
    } catch (error) {
      console.warn("Profile premium status load skipped", error);
      trialStatus = null;
    }

    try {
      appSettings = typeof APP === "object" && APP ? APP : {};
    } catch {
      appSettings = {};
    }

    return true;
  }

  function renderProfile(){
    const name = getUserName();
    $("profileAvatar").textContent = getInitial(name);
    $("profileName").textContent = name;
    $("profilePhone").querySelector("span:last-child").textContent = getUserPhone();
    $("inviteLinkText").textContent = INVITE_LINK;
    renderBadge();
  }

  function renderBadge(){
    const badge = $("profileBadge");
    badge.classList.remove("expired", "premium");

    if (typeof renderTrialPremiumBadge === "function") {
      renderTrialPremiumBadge(badge, trialStatus, currentUser, { mode:"date" });
      const state = window.TETPremiumState;
      if (isPremiumUser()) badge.classList.add("premium");
      if (badge.textContent.toLowerCase().includes("go premium")) badge.classList.add("expired");
      return;
    }

    if (isPremiumUser()) {
      badge.classList.add("premium");
      badge.innerHTML = "<b>Premium Member</b><small>Valid Until 30 Sep 2028</small>";
      badge.onclick = null;
      return;
    }

    const days = typeof calculateDaysRemaining === "function" ? calculateDaysRemaining(trialStatus?.trial_end_date) : 1;
    if (days <= 0) {
      badge.classList.add("expired");
      badge.innerHTML = "<b>Go Premium</b><small>Unlock Full Access</small>";
      badge.onclick = showPremiumFlow;
    } else {
      const endText = typeof formatDate === "function" ? formatDate(trialStatus?.trial_end_date) : "";
      badge.innerHTML = "<b>Trial Version</b><small>Ends " + safe(endText || "Soon") + "</small>";
      badge.onclick = null;
    }
  }

  function showPremiumFlow(){
    if (!navigator.onLine) {
      showToast("Please check your internet connection", "warning");
      return;
    }
    if (typeof showGlobalPremiumEntry === "function") {
      showGlobalPremiumEntry(trialStatus, currentUser);
      return;
    }
    openModal("Unlock Premium Access", `
      <p><b>₹799 Only – One Time Payment</b></p>
      <p>Full premium access to all features until 30 September 2028.</p>
      <p>This small one-time amount can support your preparation, confidence, and long-term teaching career.</p>
      <div class="profile-modal-actions"><button class="profile-primary-btn" type="button" id="fallbackPremiumPay">Subscribe Now</button><button class="profile-light-btn" type="button" id="fallbackPremiumLater">Later</button></div>
    `);
    setTimeout(function(){
      const pay = $("fallbackPremiumPay");
      const later = $("fallbackPremiumLater");
      if (pay) pay.onclick = openPremiumWhatsApp;
      if (later) later.onclick = closeModal;
    }, 0);
  }

  function showPremiumStatus(){
    if (typeof showGlobalPremiumEntry === "function") {
      showGlobalPremiumEntry(trialStatus, currentUser);
      return;
    }
    openModal("Premium User", `<p>Enjoy all premium benefits up to 30 September 2028.</p><div class="profile-modal-actions"><button class="profile-primary-btn" type="button" id="premiumBackBtn">Back</button></div>`);
    setTimeout(function(){ const b = $("premiumBackBtn"); if (b) b.onclick = closeModal; }, 0);
  }

  function openPremiumWhatsApp(){
    const message = typeof getPremiumWhatsAppMessage === "function" ? getPremiumWhatsAppMessage() : `Hello,\n\nI want to upgrade to TET Success Premium.\n\nName: ${getUserName() || "Not available"}\nPhone: ${getUserPhone() || "Not available"}\n\nPlan:\nPremium Membership\n\nSubscription Fee:\n₹799 (One-Time Payment)\n\nPremium Validity:\n30 September 2028\n\nAccess:\nFull Premium Access to all features until 30 September 2028.\n\nSelf Declaration:\nI have read and accepted that TET Success provides educational guidance and learning resources only. I understand that passing the examination depends on my own preparation and performance, and TET Success does not guarantee exam success.\n\nPayment Link:\nhttps://tinyurl.com/Tet-Success-Pay-now\n\nAfter payment send screenshot for confirmation.\n\nThank you.`;
    if (typeof openWhatsApp === "function") openWhatsApp(getAdminPhone(), message);
  }

  async function copyInvite(){
    try {
      await navigator.clipboard.writeText(INVITE_LINK);
      showToast("Invite link copied", "success");
    } catch {
      showToast("Unable to copy link", "error");
    }
  }

  function sendInvite(){
    const message = `Hi,\n\nI am using TET Success app. This app is very helpful for WB Primary TET preparation.\n\nYou should definitely try this app.\n\nDownload / open the app from here:\n${INVITE_LINK}\n\nStart your free trial and prepare step by step.\n\nThank you.`;
    const url = "https://wa.me/?text=" + encodeURIComponent(message);
    if (typeof openExternalLink === "function") openExternalLink(url);
    else window.open(url, "_blank", "noopener");
  }

  async function openSmartNotes(){
    if (!isPremiumUser() && isExpired()) {
      showPremiumFlow();
      return;
    }

    const cached = readSmartNoteCache();
    if (cached) renderSmartNote(cached);
    else openModal("Smart Notes", `<p>Loading Smart Notes...</p>`);

    try {
      const { data, error } = await client()
        .from("tet_smart_notes")
        .select("*")
        .eq("status", "active")
        .order("created_at", { ascending:false })
        .limit(1)
        .maybeSingle();
      if (error) throw error;
      if (!data) {
        if (!cached) openModal("Smart Notes", `<p>Smart Notes are being updated. Please check again soon.</p><div class="profile-modal-actions"><button class="profile-light-btn" type="button" id="smartBackBtn">Back</button></div>`);
      } else {
        localStorage.setItem(SMART_NOTE_CACHE, JSON.stringify(data));
        renderSmartNote(data);
      }
    } catch (error) {
      console.warn("Smart Notes load failed", error);
      if (!cached) openModal("Smart Notes", `<p>Smart Notes are being updated. Please check again soon.</p><div class="profile-modal-actions"><button class="profile-light-btn" type="button" id="smartBackBtn">Back</button></div>`);
    }
    setTimeout(function(){ const b = $("smartBackBtn"); if (b) b.onclick = closeModal; }, 0);
  }

  function readSmartNoteCache(){
    try { return JSON.parse(localStorage.getItem(SMART_NOTE_CACHE)); } catch { return null; }
  }

  function renderSmartNote(note){
    openModal("Smart Notes", `
      <span class="note-badge">${safe(note.subject || "Subject")}</span>
      <h3 style="margin:0 0 10px;color:#174B33">${safe(note.title || "Quick Revision")}</h3>
      <div class="note-box"><b>Rule</b><br>${safe(note.rule_text || "Smart Notes are being updated. Please check again soon.").replace(/\n/g,"<br>")}</div>
      ${note.example_text ? `<div class="note-box"><b>Examples</b><br>${safe(note.example_text).replace(/\n/g,"<br>")}</div>` : ""}
      <div class="profile-modal-actions"><button class="profile-light-btn" type="button" id="smartBackBtn">Back</button></div>
    `);
    setTimeout(function(){ const b = $("smartBackBtn"); if (b) b.onclick = closeModal; }, 0);
  }

  function isExpired(){
    if (isPremiumUser()) return false;
    if (typeof isTrialExpiredStatus === "function") return isTrialExpiredStatus(trialStatus, currentUser);
    return typeof calculateDaysRemaining === "function" ? calculateDaysRemaining(trialStatus?.trial_end_date) <= 0 : false;
  }

  function openScores(){
    let result = null;
    try { result = JSON.parse(localStorage.getItem(MOCK_RESULT_KEY)); } catch { result = null; }
    if (!result) {
      openModal("Scores", `<p>No mock test result yet. Start today’s mock test from Learn page.</p><div class="profile-modal-actions"><button class="profile-light-btn" type="button" id="scoreBackBtn">Back</button></div>`);
    } else {
      const score = Number(result.score || result.correct || 0);
      const total = Number(result.total || 30);
      const wrong = Number(result.wrong ?? Math.max(0,total-score));
      const percent = Number(result.percentage || Math.round((score/total)*100));
      const label = result.label || getScoreLabel(score);
      openModal("Scores", `
        <div class="score-grid">
          <div class="score-box"><small>Last Score</small><b>${score} / ${total}</b></div>
          <div class="score-box"><small>Percentage</small><b>${percent}%</b></div>
          <div class="score-box"><small>Correct</small><b>${score}</b></div>
          <div class="score-box"><small>Wrong</small><b>${wrong}</b></div>
        </div>
        <p style="margin:14px 0 0;color:#174B33;font-weight:900">${safe(label)}</p>
        <div class="profile-modal-actions"><button class="profile-light-btn" type="button" id="scoreBackBtn">Back</button></div>
      `);
    }
    setTimeout(function(){ const b = $("scoreBackBtn"); if (b) b.onclick = closeModal; }, 0);
  }

  function getScoreLabel(score){
    if (score === 30) return "Excellent";
    if (score >= 25) return "Very Good";
    if (score >= 20) return "Good, Keep Improving";
    return "Practice Again";
  }

  function openReminder(){
    openModal("Daily Study Reminder", `<p>Study a little every day.</p><p>Complete one mock test and revise Smart Notes regularly.</p><div class="profile-modal-actions"><button class="profile-light-btn" type="button" id="reminderBackBtn">Back</button></div>`);
    setTimeout(function(){ const b = $("reminderBackBtn"); if (b) b.onclick = closeModal; }, 0);
  }

  function openSupport(){
    openModal("Support", `
      <div class="support-list">
        <button class="profile-light-btn" type="button" id="contactAdminBtn">Contact Admin</button>
        <button class="profile-light-btn" type="button" id="reportIssueBtn">Report an Issue</button>
        <button class="profile-light-btn" type="button" id="rateAppBtn">Rate This App</button>
      </div>
    `);
    setTimeout(function(){
      const admin = $("contactAdminBtn");
      const issue = $("reportIssueBtn");
      const rate = $("rateAppBtn");
      if (admin) admin.onclick = contactAdmin;
      if (issue) issue.onclick = openIssueForm;
      if (rate) rate.onclick = function(){ showToast("Coming Soon", "info"); };
    }, 0);
  }

  function contactAdmin(){
    const message = `Hello TET Success Team,\n\nI need help.\n\nName: ${getUserName()}\nPhone: ${getUserPhone()}`;
    if (typeof openWhatsApp === "function") openWhatsApp(getAdminPhone(), message);
  }

  function openIssueForm(){
    openModal("Report an Issue", `
      <div class="note-box">
        <label style="display:block;font-weight:900;margin-bottom:6px;color:#174B33">Issue Category</label>
        <select id="issueCategory" style="width:100%;min-height:46px;border:1px solid #DDECE1;border-radius:12px;padding:10px;background:#fff;color:#2F3E36">
          <option value="">Select category</option>
          <option>Login Problem</option>
          <option>Learn Page</option>
          <option>Question Wrong</option>
          <option>Progress Issue</option>
          <option>Payment Issue</option>
          <option>Premium Issue</option>
          <option>App Crash</option>
          <option>Other</option>
        </select>
      </div>
      <div class="note-box">
        <label style="display:block;font-weight:900;margin-bottom:6px;color:#174B33">Describe Your Issue</label>
        <textarea id="issueText" maxlength="500" style="width:100%;min-height:112px;border:1px solid #DDECE1;border-radius:12px;padding:10px;background:#fff;color:#2F3E36;resize:vertical"></textarea>
      </div>
      <div class="profile-modal-actions">
        <button class="profile-primary-btn" type="button" id="sendIssueBtn">Send Report</button>
        <button class="profile-light-btn" type="button" id="cancelIssueBtn">Back</button>
      </div>
    `);
    setTimeout(function(){
      const send = $("sendIssueBtn");
      const cancel = $("cancelIssueBtn");
      if (send) send.onclick = sendIssueReport;
      if (cancel) cancel.onclick = closeModal;
    }, 0);
  }

  async function sendIssueReport(){
    const category = text($("issueCategory")?.value, "");
    const issueText = text($("issueText")?.value, "").trim();
    if (!category) {
      showToast("Please select issue category", "warning");
      return;
    }
    if (!issueText) {
      showToast("Please describe your issue", "warning");
      return;
    }
    if (issueText.length < 10) {
      showToast("Minimum 10 characters required", "warning");
      return;
    }

    try {
      const payload = {
        user_id: currentUser.id,
        full_name: getUserName(),
        phone: getUserPhone(),
        user_status: isPremiumUser() ? "Premium Member" : "Trial",
        issue_category: category,
        issue_text: issueText,
        issue_status: "unsolved"
      };
      const { error } = await client().from(CONFIG.TABLES.ISSUE_REPORTS).insert(payload);
      if (error) throw error;
      showToast("Issue report sent", "success");
      closeModal();
      if (typeof openWhatsApp === "function") {
        openWhatsApp(getAdminPhone(), `Hello TET Success Team,\n\nI want to report an issue.\n\nName: ${getUserName()}\nPhone: ${getUserPhone()}\n\nIssue Category:\n${category}\n\nIssue Description:\n${issueText}\n\nThank you.`);
      }
    } catch (error) {
      console.error("Issue report failed", error);
      showToast("Unable to send report", "error");
    }
  }

  function logout(){
    const doLogout = function(){
      if (typeof clearUserSession === "function") clearUserSession();
      else localStorage.removeItem("tet_success_user_session");
      window.location.href = CONFIG.LOGIN_PAGE;
    };
    if (typeof showConfirmModal === "function") {
      showConfirmModal({ title:"Logout?", message:"Are you sure you want to logout from TET Success?", confirmText:"Logout", cancelText:"Back", onConfirm:doLogout });
    } else {
      doLogout();
    }
  }

  function bindEvents(){
    document.querySelectorAll("[data-page]").forEach(function(btn){
      btn.addEventListener("click", function(){ window.location.href = btn.dataset.page; });
    });
    $("modalCloseBtn").addEventListener("click", closeModal);
    $("profileModal").addEventListener("click", function(event){ if (event.target === $("profileModal")) closeModal(); });
    $("premiumBtn").addEventListener("click", function(){ isPremiumUser() ? showPremiumStatus() : showPremiumFlow(); });
    $("smartNotesBtn").addEventListener("click", openSmartNotes);
    $("scoresBtn").addEventListener("click", openScores);
    $("reminderBtn").addEventListener("click", openReminder);
    $("supportBtn").addEventListener("click", openSupport);
    $("logoutBtn").addEventListener("click", logout);
    $("copyInviteBtn").addEventListener("click", copyInvite);
    $("sendInviteBtn").addEventListener("click", sendInvite);
  }

  document.addEventListener("DOMContentLoaded", async function(){
    if (typeof requireUserLogin === "function" && !requireUserLogin()) return;
    bindEvents();
    if (typeof initializeBackend === "function") {
      try { await initializeBackend(); } catch (error) { console.warn("Backend init skipped", error); }
    }
    const ok = await loadUserAndStatus();
    if (!ok) return;
    renderProfile();
  });
})();
</script>
</body>
</html>
